# Server configuration
server.port=${PORT:8080}
spring.application.name=xebia-lms-merged-backend

# Multipart configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:learning_platform}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=15000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=never

spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.host=${SPRING_REDIS_HOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${SPRING_REDIS_PORT:${REDIS_PORT:6379}}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:${REDIS_PASSWORD:}}
spring.data.redis.timeout=60000
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

app.jwt.secret=${JWT_SECRET:CHANGE_ME_use_a_long_random_string_in_env}
app.jwt.expiration-ms=86400000

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloudinary_cloud_name}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:your_cloudinary_api_key}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_cloudinary_api_secret}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloudinary_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_cloudinary_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_cloudinary_api_secret}